<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Electronics & Gadgets</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="../index.html" class="btn btn-secondary">← Back to All Verticals</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>🛍️ TechStore</h1>
            <p>Your one-stop shop for electronics and gadgets</p>
        </header>

        <div class="card">
            <h2>Featured Products</h2>
            <div class="product-grid" id="product-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        // Sample products
        const products = [
            {
                id: 'PROD001',
                name: 'Wireless Headphones',
                category: 'Audio',
                price: 149.99,
                brand: 'SoundMax',
                emoji: '🎧'
            },
            {
                id: 'PROD002',
                name: 'Smart Watch',
                category: 'Wearables',
                price: 299.99,
                brand: 'TechTime',
                emoji: '⌚'
            },
            {
                id: 'PROD003',
                name: 'Laptop Stand',
                category: 'Accessories',
                price: 49.99,
                brand: 'ErgoDesk',
                emoji: '💻'
            },
            {
                id: 'PROD004',
                name: 'USB-C Hub',
                category: 'Accessories',
                price: 79.99,
                brand: 'ConnectPro',
                emoji: '🔌'
            },
            {
                id: 'PROD005',
                name: 'Wireless Charger',
                category: 'Accessories',
                price: 39.99,
                brand: 'PowerUp',
                emoji: '⚡'
            },
            {
                id: 'PROD006',
                name: 'Bluetooth Speaker',
                category: 'Audio',
                price: 89.99,
                brand: 'SoundMax',
                emoji: '🔊'
            }
        ];

        // Render products
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <h3>${product.name}</h3>
                    <p>${product.brand} • ${product.category}</p>
                    <div class="price">${formatCurrency(product.price)}</div>
                    <button class="btn btn-primary" onclick="addToCart('${product.id}')">
                        Add to Cart
                    </button>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            // Get existing cart
            let cart = Storage.get('retail_cart') || [];

            // Check if product already in cart
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }

            Storage.set('retail_cart', cart);

            // Track add to cart event
            trackEvent('add_to_cart', {
                event_category: 'ecommerce',
                event_action: 'add_to_cart',
                product_id: [product.id],
                product_name: [product.name],
                product_category: [product.category],
                product_brand: [product.brand],
                product_price: [product.price],
                product_quantity: [1],
                currency: 'USD'
            });

            showToast(`✓ ${product.name} added to cart!`);

            // Update cart count in UI (if you add a cart icon later)
            updateCartCount();
        }

        function updateCartCount() {
            const cart = Storage.get('retail_cart') || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            console.log(`🛒 Cart items: ${count}`);
        }

        // Track page view on load
        trackPageView({
            page_name: 'Home',
            page_type: 'home',
            site_section: 'retail',
            vertical: 'ecommerce'
        });

        // Initialize
        renderProducts();
        updateCartCount();
    </script>

    <div style="margin-top: 40px; text-align: center;">
        <a href="cart.html" class="btn btn-primary" style="display: inline-block;">
            View Cart & Checkout →
        </a>
    </div>
</body>
</html>

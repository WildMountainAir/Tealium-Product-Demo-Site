<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - TechStore</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="shipping.html" class="btn btn-secondary">← Back to Shipping</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>💳 Payment Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Cart</div>
            </div>
            <div class="step completed">
                <div class="step-number">2</div>
                <div class="step-label">Shipping</div>
            </div>
            <div class="step active">
                <div class="step-number">3</div>
                <div class="step-label">Payment</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Payment Method</h2>
            <form id="payment-form">
                <div class="form-group">
                    <label>Card Number *</label>
                    <input type="text" id="card_number" required placeholder="4111 1111 1111 1111"
                           value="4111 1111 1111 1111" maxlength="19">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expiration Date *</label>
                        <input type="text" id="card_expiry" required placeholder="MM/YY"
                               value="12/25" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVV *</label>
                        <input type="text" id="card_cvv" required placeholder="123"
                               value="123" maxlength="4">
                    </div>
                </div>

                <div class="form-group">
                    <label>Cardholder Name *</label>
                    <input type="text" id="card_name" required value="John Smith">
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="billing_same" checked onchange="toggleBillingAddress()"
                               style="width: auto; margin-right: 10px;">
                        Billing address same as shipping
                    </label>
                </div>

                <div id="billing-address" style="display: none;">
                    <h3 style="margin: 20px 0 15px 0;">Billing Address</h3>
                    <div class="form-group">
                        <label>Address *</label>
                        <input type="text" id="billing_address">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" id="billing_city">
                        </div>
                        <div class="form-group">
                            <label>State *</label>
                            <input type="text" id="billing_state">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ZIP *</label>
                            <input type="text" id="billing_zip">
                        </div>
                        <div class="form-group">
                            <label>Country *</label>
                            <input type="text" id="billing_country">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="cart-summary" id="order-summary">
                <!-- Summary will be loaded here -->
            </div>
        </div>

        <div class="alert alert-info">
            <strong>💡 Test Mode:</strong> This is a demo site. No actual payment will be processed.
        </div>

        <div class="btn-group">
            <a href="shipping.html" class="btn btn-secondary">← Back to Shipping</a>
            <button class="btn btn-primary" onclick="completeOrder()">
                Complete Order →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        let cart = [];
        let shippingInfo = {};
        let shippingCosts = {
            standard: 9.99,
            express: 19.99,
            overnight: 39.99
        };

        function toggleBillingAddress() {
            const billingSame = document.getElementById('billing_same').checked;
            document.getElementById('billing-address').style.display = billingSame ? 'none' : 'block';
        }

        // Update order summary
        function updateOrderSummary() {
            cart = Storage.get('retail_cart') || [];
            shippingInfo = Storage.get('retail_shipping') || {};

            if (cart.length === 0 || !shippingInfo.email) {
                window.location.href = 'index.html';
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            const shipping = subtotal > 100 && shippingInfo.shipping_method === 'standard' ?
                0 : shippingCosts[shippingInfo.shipping_method];
            const total = subtotal + tax + shipping;

            document.getElementById('order-summary').innerHTML = `
                <h3 style="margin-bottom: 15px;">Order Summary</h3>
                <div class="summary-row">
                    <span>Items (${cart.length}):</span>
                    <span>${formatCurrency(subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%):</span>
                    <span>${formatCurrency(tax)}</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>${shipping === 0 ? 'FREE' : formatCurrency(shipping)}</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>${formatCurrency(total)}</span>
                </div>
                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
                    <strong>Shipping to:</strong><br>
                    ${shippingInfo.first_name} ${shippingInfo.last_name}<br>
                    ${shippingInfo.address1}<br>
                    ${shippingInfo.city}, ${shippingInfo.state} ${shippingInfo.zip}
                </div>
            `;
        }

        // Complete order
        function completeOrder() {
            const form = document.getElementById('payment-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Calculate totals
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            const shipping = subtotal > 100 && shippingInfo.shipping_method === 'standard' ?
                0 : shippingCosts[shippingInfo.shipping_method];
            const total = subtotal + tax + shipping;

            // Generate order ID
            const orderId = generateId('ORDER');

            // Gather payment info
            const paymentInfo = {
                card_type: 'visa',
                card_last4: document.getElementById('card_number').value.slice(-4),
                payment_method: 'credit_card'
            };

            Storage.set('retail_payment', paymentInfo);
            Storage.set('retail_order_id', orderId);

            // Track payment info
            trackEvent('add_payment_info', {
                event_category: 'ecommerce',
                event_action: 'add_payment_info',
                checkout_step: 3,
                payment_method: 'credit_card',
                card_type: 'visa'
            });

            // Track purchase
            const productIds = cart.map(item => item.id);
            const productNames = cart.map(item => item.name);
            const productCategories = cart.map(item => item.category);
            const productBrands = cart.map(item => item.brand);
            const productPrices = cart.map(item => item.price);
            const productQuantities = cart.map(item => item.quantity);

            trackEvent('purchase', {
                event_category: 'ecommerce',
                event_action: 'purchase',
                order_id: orderId,
                order_total: total,
                order_subtotal: subtotal,
                order_tax: tax,
                order_shipping: shipping,
                order_currency: 'USD',
                product_id: productIds,
                product_name: productNames,
                product_category: productCategories,
                product_brand: productBrands,
                product_unit_price: productPrices,
                product_quantity: productQuantities,
                customer_email: shippingInfo.email,
                customer_city: shippingInfo.city,
                customer_state: shippingInfo.state,
                customer_zip: shippingInfo.zip,
                customer_country: shippingInfo.country,
                shipping_method: shippingInfo.shipping_method,
                order_payment_type: 'credit_card'
            });

            // Redirect to confirmation
            setTimeout(() => {
                window.location.href = 'confirmation.html';
            }, 500);
        }

        // Track page view
        trackPageView({
            page_name: 'Payment',
            page_type: 'checkout',
            site_section: 'retail',
            vertical: 'ecommerce',
            checkout_step: 3
        });

        // Initialize
        updateOrderSummary();
    </script>
</body>
</html>

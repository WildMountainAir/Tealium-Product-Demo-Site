<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Information - TechStore</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="cart.html" class="btn btn-secondary">← Back to Cart</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>📦 Shipping Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Cart</div>
            </div>
            <div class="step active">
                <div class="step-number">2</div>
                <div class="step-label">Shipping</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-label">Payment</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Delivery Address</h2>
            <form id="shipping-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="first_name" required value="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="last_name" required value="Smith">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required value="john.smith@example.com">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" required value="555-123-4567">
                </div>

                <div class="form-group">
                    <label>Address Line 1 *</label>
                    <input type="text" id="address1" required value="123 Main Street">
                </div>

                <div class="form-group">
                    <label>Address Line 2</label>
                    <input type="text" id="address2" placeholder="Apartment, suite, etc. (optional)">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" id="city" required value="San Francisco">
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <select id="state" required>
                            <option value="CA" selected>California</option>
                            <option value="NY">New York</option>
                            <option value="TX">Texas</option>
                            <option value="FL">Florida</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ZIP Code *</label>
                        <input type="text" id="zip" required value="94102">
                    </div>
                    <div class="form-group">
                        <label>Country *</label>
                        <select id="country" required>
                            <option value="US" selected>United States</option>
                            <option value="CA">Canada</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Shipping Method *</label>
                    <select id="shipping_method" required onchange="updateShippingCost()">
                        <option value="standard">Standard Shipping (5-7 business days) - $9.99</option>
                        <option value="express">Express Shipping (2-3 business days) - $19.99</option>
                        <option value="overnight">Overnight Shipping (1 business day) - $39.99</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="cart-summary" id="order-summary">
                <!-- Summary will be loaded here -->
            </div>
        </div>

        <div class="btn-group">
            <a href="cart.html" class="btn btn-secondary">← Back to Cart</a>
            <button class="btn btn-primary" onclick="proceedToPayment()">
                Continue to Payment →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        let cart = [];
        let shippingCosts = {
            standard: 9.99,
            express: 19.99,
            overnight: 39.99
        };

        // Update order summary
        function updateOrderSummary() {
            cart = Storage.get('retail_cart') || [];

            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            const shippingMethod = document.getElementById('shipping_method').value;
            const shipping = subtotal > 100 && shippingMethod === 'standard' ? 0 : shippingCosts[shippingMethod];
            const total = subtotal + tax + shipping;

            document.getElementById('order-summary').innerHTML = `
                <h3 style="margin-bottom: 15px;">Order Summary</h3>
                <div class="summary-row">
                    <span>Items (${cart.length}):</span>
                    <span>${formatCurrency(subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%):</span>
                    <span>${formatCurrency(tax)}</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>${shipping === 0 ? 'FREE' : formatCurrency(shipping)}</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>${formatCurrency(total)}</span>
                </div>
            `;
        }

        function updateShippingCost() {
            updateOrderSummary();
        }

        // Proceed to payment
        function proceedToPayment() {
            const form = document.getElementById('shipping-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Gather shipping info
            const shippingInfo = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address1: document.getElementById('address1').value,
                address2: document.getElementById('address2').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zip: document.getElementById('zip').value,
                country: document.getElementById('country').value,
                shipping_method: document.getElementById('shipping_method').value
            };

            Storage.set('retail_shipping', shippingInfo);

            // Track checkout progress
            trackEvent('checkout_progress', {
                event_category: 'ecommerce',
                event_action: 'checkout_progress',
                checkout_step: 2,
                shipping_method: shippingInfo.shipping_method,
                customer_email: shippingInfo.email,
                customer_city: shippingInfo.city,
                customer_state: shippingInfo.state,
                customer_zip: shippingInfo.zip,
                customer_country: shippingInfo.country
            });

            window.location.href = 'payment.html';
        }

        // Track page view
        trackPageView({
            page_name: 'Shipping',
            page_type: 'checkout',
            site_section: 'retail',
            vertical: 'ecommerce',
            checkout_step: 2
        });

        // Initialize
        updateOrderSummary();
    </script>
</body>
</html>

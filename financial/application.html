<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application - SecureBank</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-secondary">← Back to Products</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>💳 Application</h1>
        </header>

        <div class="step-indicator">
            <div class="step active">
                <div class="step-number">1</div>
                <div class="step-label">Personal Info</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-label">Financial Info</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-label">Review</div>
            </div>
        </div>

        <div class="card">
            <h2>Applying for: <span id="product-name"></span></h2>
            <div id="product-details" style="background: #f5f5f5; padding: 15px; border-radius: 6px; margin-bottom: 20px;"></div>
        </div>

        <div class="card">
            <h2>Personal Information</h2>
            <form id="application-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="first_name" required value="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="last_name" required value="Smith">
                    </div>
                </div>

                <div class="form-group">
                    <label>Date of Birth *</label>
                    <input type="date" id="dob" required value="1985-01-15">
                </div>

                <div class="form-group">
                    <label>Social Security Number *</label>
                    <input type="text" id="ssn" required placeholder="XXX-XX-XXXX" value="123-45-6789" maxlength="11">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required value="john.smith@example.com">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" required value="555-123-4567">
                </div>

                <div class="form-group">
                    <label>Address *</label>
                    <input type="text" id="address" required value="123 Main Street">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" id="city" required value="San Francisco">
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <select id="state" required>
                            <option value="CA" selected>California</option>
                            <option value="NY">New York</option>
                            <option value="TX">Texas</option>
                            <option value="FL">Florida</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ZIP Code *</label>
                        <input type="text" id="zip" required value="94102">
                    </div>
                    <div class="form-group">
                        <label>Citizenship *</label>
                        <select id="citizenship" required>
                            <option value="US" selected>U.S. Citizen</option>
                            <option value="PR">Permanent Resident</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-secondary">← Back to Products</a>
            <button class="btn btn-primary" onclick="continueToFinancial()">
                Continue to Financial Info →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        let product = {};

        function displayProduct() {
            product = Storage.get('financial_product') || {};

            if (!product.type) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('product-name').textContent = product.name;

            if (product.type === 'credit_card') {
                document.getElementById('product-details').innerHTML = `
                    <strong>Card:</strong> ${product.name}<br>
                    <strong>Category:</strong> ${product.category}<br>
                    <strong>Annual Fee:</strong> ${product.annual_fee === 0 ? 'No Fee' : formatCurrency(product.annual_fee)}<br>
                    <strong>Rewards:</strong> ${product.rewards_rate}
                `;
            } else if (product.type === 'loan') {
                document.getElementById('product-details').innerHTML = `
                    <strong>Loan Amount:</strong> ${formatCurrency(product.amount)}<br>
                    <strong>Term:</strong> ${product.term_years} years<br>
                    <strong>APR:</strong> ${product.apr}%<br>
                    <strong>Monthly Payment:</strong> ${formatCurrency(product.monthly_payment)}
                `;
            }
        }

        function continueToFinancial() {
            const form = document.getElementById('application-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const personalInfo = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                dob: document.getElementById('dob').value,
                ssn: document.getElementById('ssn').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zip: document.getElementById('zip').value,
                citizenship: document.getElementById('citizenship').value
            };

            Storage.set('financial_personal_info', personalInfo);

            trackEvent('application_progress', {
                event_category: 'financial',
                event_action: 'application_step_1',
                application_step: 1,
                product_type: product.type,
                product_id: product.id,
                product_name: product.name
            });

            window.location.href = 'financial-info.html';
        }

        // Track page view
        trackPageView({
            page_name: 'Application - Personal Info',
            page_type: 'application',
            site_section: 'financial',
            vertical: 'financial_services',
            application_step: 1
        });

        // Initialize
        displayProduct();
    </script>
</body>
</html>

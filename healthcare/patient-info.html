<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Information - HealthPlus</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="appointment.html" class="btn btn-secondary">← Back to Appointment</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>👤 Patient Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Find Doctor</div>
            </div>
            <div class="step completed">
                <div class="step-number">2</div>
                <div class="step-label">Date & Time</div>
            </div>
            <div class="step active">
                <div class="step-number">3</div>
                <div class="step-label">Patient Info</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Patient Details</h2>
            <form id="patient-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="first_name" required value="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="last_name" required value="Smith">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" id="dob" required value="1985-01-15">
                    </div>
                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" required>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required value="john.smith@example.com">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" required value="555-123-4567">
                </div>

                <h3 style="margin: 30px 0 15px;">Insurance Information</h3>

                <div class="form-group">
                    <label>Insurance Provider *</label>
                    <select id="insurance_provider" required>
                        <option value="bluecross">Blue Cross Blue Shield</option>
                        <option value="aetna">Aetna</option>
                        <option value="cigna">Cigna</option>
                        <option value="unitedhealth">UnitedHealthcare</option>
                        <option value="self-pay">Self Pay (No Insurance)</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Policy Number</label>
                        <input type="text" id="policy_number" value="ABC123456789">
                    </div>
                    <div class="form-group">
                        <label>Group Number</label>
                        <input type="text" id="group_number" value="GRP12345">
                    </div>
                </div>
            </form>
        </div>

        <div class="btn-group">
            <a href="appointment.html" class="btn btn-secondary">← Back to Appointment</a>
            <button class="btn btn-primary" onclick="confirmBooking()">
                Confirm Booking →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        function confirmBooking() {
            const form = document.getElementById('patient-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const patientInfo = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                insurance_provider: document.getElementById('insurance_provider').value,
                policy_number: document.getElementById('policy_number').value,
                group_number: document.getElementById('group_number').value
            };

            Storage.set('healthcare_patient_info', patientInfo);

            const doctor = Storage.get('healthcare_selected_doctor') || {};
            const appointmentDetails = Storage.get('healthcare_appointment_details') || {};
            const appointmentId = generateId('APPT');
            Storage.set('healthcare_appointment_id', appointmentId);

            trackEvent('appointment_booked', {
                event_category: 'healthcare',
                event_action: 'book_appointment',
                appointment_id: appointmentId,
                doctor_id: doctor.id,
                doctor_name: doctor.name,
                specialty: doctor.specialty,
                appointment_date: appointmentDetails.date,
                appointment_time: appointmentDetails.time,
                visit_reason: appointmentDetails.reason,
                insurance_provider: patientInfo.insurance_provider,
                patient_email: patientInfo.email
            });

            window.location.href = 'confirmation.html';
        }

        trackPageView({
            page_name: 'Patient Information',
            page_type: 'booking',
            site_section: 'healthcare',
            vertical: 'healthcare',
            booking_step: 3
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Information - CloudSync</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="signup.html" class="btn btn-secondary">← Back to Account</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>🏢 Company Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Account</div>
            </div>
            <div class="step active">
                <div class="step-number">2</div>
                <div class="step-label">Company</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Tell Us About Your Company</h2>
            <form id="company-form">
                <div class="form-group">
                    <label>Company Name *</label>
                    <input type="text" id="company_name" required value="Acme Corporation">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Industry *</label>
                        <select id="industry" required>
                            <option value="technology">Technology</option>
                            <option value="retail">Retail</option>
                            <option value="finance">Financial Services</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="media">Media & Entertainment</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Company Size *</label>
                        <select id="company_size" required>
                            <option value="1-10">1-10 employees</option>
                            <option value="11-50">11-50 employees</option>
                            <option value="51-200">51-200 employees</option>
                            <option value="201-500">201-500 employees</option>
                            <option value="501+">501+ employees</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Website *</label>
                    <input type="url" id="website" required value="https://acme.com">
                </div>

                <div class="form-group">
                    <label>Company Address *</label>
                    <input type="text" id="address" required value="123 Business Blvd">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" id="city" required value="San Francisco">
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <select id="state" required>
                            <option value="CA" selected>California</option>
                            <option value="NY">New York</option>
                            <option value="TX">Texas</option>
                            <option value="FL">Florida</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ZIP *</label>
                        <input type="text" id="zip" required value="94102">
                    </div>
                    <div class="form-group">
                        <label>Country *</label>
                        <select id="country" required>
                            <option value="US" selected>United States</option>
                            <option value="CA">Canada</option>
                            <option value="UK">United Kingdom</option>
                        </select>
                    </div>
                </div>

                <h3 style="margin: 30px 0 15px;">Use Case</h3>

                <div class="form-group">
                    <label>What's your primary use case? *</label>
                    <select id="use_case" required>
                        <option value="analytics">Analytics & Reporting</option>
                        <option value="marketing">Marketing Automation</option>
                        <option value="personalization">Personalization</option>
                        <option value="data-integration">Data Integration</option>
                        <option value="compliance">Compliance & Governance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>How did you hear about us? *</label>
                    <select id="referral_source" required>
                        <option value="search">Search Engine</option>
                        <option value="social">Social Media</option>
                        <option value="referral">Referral</option>
                        <option value="event">Event/Conference</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="btn-group">
            <a href="signup.html" class="btn btn-secondary">← Back to Account</a>
            <button class="btn btn-primary" onclick="completeSignup()">
                Complete Sign Up →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        function completeSignup() {
            const form = document.getElementById('company-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const companyInfo = {
                company_name: document.getElementById('company_name').value,
                industry: document.getElementById('industry').value,
                company_size: document.getElementById('company_size').value,
                website: document.getElementById('website').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zip: document.getElementById('zip').value,
                country: document.getElementById('country').value,
                use_case: document.getElementById('use_case').value,
                referral_source: document.getElementById('referral_source').value
            };

            Storage.set('b2b_company_info', companyInfo);

            const accountInfo = Storage.get('b2b_account_info') || {};
            const selectedPlan = Storage.get('b2b_selected_plan') || {};
            const accountId = generateId('ACCT');
            Storage.set('b2b_account_id', accountId);

            trackEvent('signup_complete', {
                event_category: 'b2b',
                event_action: 'signup_complete',
                account_id: accountId,
                plan_name: selectedPlan.plan,
                plan_price: selectedPlan.price,
                company_name: companyInfo.company_name,
                industry: companyInfo.industry,
                company_size: companyInfo.company_size,
                use_case: companyInfo.use_case,
                referral_source: companyInfo.referral_source,
                user_email: accountInfo.email,
                job_title: accountInfo.job_title
            });

            window.location.href = 'confirmation.html';
        }

        trackPageView({
            page_name: 'Sign Up - Company Info',
            page_type: 'signup',
            site_section: 'b2b',
            vertical: 'b2b_saas',
            signup_step: 2
        });
    </script>
</body>
</html>

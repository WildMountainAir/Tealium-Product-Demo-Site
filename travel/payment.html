<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - SkyTravel</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="travelers.html" class="btn btn-secondary">← Back to Travelers</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>💳 Payment Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Search</div>
            </div>
            <div class="step completed">
                <div class="step-number">2</div>
                <div class="step-label">Select</div>
            </div>
            <div class="step completed">
                <div class="step-number">3</div>
                <div class="step-label">Travelers</div>
            </div>
            <div class="step active">
                <div class="step-number">4</div>
                <div class="step-label">Payment</div>
            </div>
            <div class="step">
                <div class="step-number">5</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Payment Method</h2>
            <form id="payment-form">
                <div class="form-group">
                    <label>Card Number *</label>
                    <input type="text" id="card_number" required placeholder="4111 1111 1111 1111"
                           value="4111 1111 1111 1111" maxlength="19">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expiration Date *</label>
                        <input type="text" id="card_expiry" required placeholder="MM/YY"
                               value="12/25" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVV *</label>
                        <input type="text" id="card_cvv" required placeholder="123"
                               value="123" maxlength="4">
                    </div>
                </div>

                <div class="form-group">
                    <label>Cardholder Name *</label>
                    <input type="text" id="card_name" required value="John Smith">
                </div>

                <div class="form-group">
                    <label>Billing Address *</label>
                    <input type="text" id="billing_address" required value="123 Main Street">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" id="billing_city" required value="San Francisco">
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <select id="billing_state" required>
                            <option value="CA" selected>California</option>
                            <option value="NY">New York</option>
                            <option value="TX">Texas</option>
                            <option value="FL">Florida</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ZIP *</label>
                        <input type="text" id="billing_zip" required value="94102">
                    </div>
                    <div class="form-group">
                        <label>Country *</label>
                        <select id="billing_country" required>
                            <option value="US" selected>United States</option>
                            <option value="CA">Canada</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="cart-summary" id="booking-summary"></div>
        </div>

        <div class="alert alert-info">
            <strong>💡 Test Mode:</strong> This is a demo site. No actual payment will be processed.
        </div>

        <div class="btn-group">
            <a href="travelers.html" class="btn btn-secondary">← Back to Travelers</a>
            <button class="btn btn-primary" onclick="completeBooking()">
                Complete Booking →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        let searchParams = {};
        let selectedFlight = {};
        let travelersInfo = {};

        function updateBookingSummary() {
            searchParams = Storage.get('travel_search') || {};
            selectedFlight = Storage.get('travel_selected_flight') || {};
            travelersInfo = Storage.get('travel_travelers') || {};

            if (!selectedFlight.id || !travelersInfo.travelers) {
                window.location.href = 'index.html';
                return;
            }

            const subtotal = selectedFlight.total_price || 0;
            const taxes = subtotal * 0.15;
            const fees = 25.00 * searchParams.passengers;
            const total = subtotal + taxes + fees;

            document.getElementById('booking-summary').innerHTML = `
                <h3 style="margin-bottom: 15px;">Booking Summary</h3>
                <div style="background: #f5f5f5; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
                    <strong>Flight:</strong> ${selectedFlight.airline} ${selectedFlight.id}<br>
                    <strong>Route:</strong> ${selectedFlight.origin} → ${selectedFlight.destination}<br>
                    <strong>Departure:</strong> ${searchParams.departure_date}<br>
                    <strong>Passengers:</strong> ${searchParams.passengers}
                </div>
                <div class="summary-row">
                    <span>Flight Total:</span>
                    <span>${formatCurrency(subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>Taxes & Fees:</span>
                    <span>${formatCurrency(taxes + fees)}</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>${formatCurrency(total)}</span>
                </div>
            `;
        }

        function completeBooking() {
            const form = document.getElementById('payment-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Calculate totals
            const subtotal = selectedFlight.total_price || 0;
            const taxes = subtotal * 0.15;
            const fees = 25.00 * searchParams.passengers;
            const total = subtotal + taxes + fees;

            // Generate booking reference
            const bookingRef = generateId('BOOK');

            Storage.set('travel_booking_ref', bookingRef);

            // Track purchase
            trackEvent('purchase', {
                event_category: 'travel',
                event_action: 'purchase',
                booking_reference: bookingRef,
                booking_total: total,
                flight_total: subtotal,
                taxes_fees: taxes + fees,
                currency: 'USD',
                flight_id: selectedFlight.id,
                airline: selectedFlight.airline,
                origin: selectedFlight.origin,
                destination: selectedFlight.destination,
                departure_date: searchParams.departure_date,
                return_date: searchParams.return_date,
                passengers: searchParams.passengers,
                cabin_class: searchParams.cabin_class,
                contact_email: travelersInfo.contact_email,
                payment_method: 'credit_card'
            });

            setTimeout(() => {
                window.location.href = 'confirmation.html';
            }, 500);
        }

        // Track page view
        trackPageView({
            page_name: 'Payment',
            page_type: 'checkout',
            site_section: 'travel',
            vertical: 'travel',
            checkout_step: 4
        });

        // Initialize
        updateBookingSummary();
    </script>
</body>
</html>

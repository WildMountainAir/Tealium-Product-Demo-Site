<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Information - SkyTravel</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="page-container">
        <div style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-secondary">← Back to Flight Search</a>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1>✈️ Traveler Information</h1>
        </header>

        <div class="step-indicator">
            <div class="step completed">
                <div class="step-number">1</div>
                <div class="step-label">Search</div>
            </div>
            <div class="step completed">
                <div class="step-number">2</div>
                <div class="step-label">Select</div>
            </div>
            <div class="step active">
                <div class="step-number">3</div>
                <div class="step-label">Travelers</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div class="step-label">Payment</div>
            </div>
            <div class="step">
                <div class="step-number">5</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <div class="card">
            <h2>Selected Flight</h2>
            <div id="selected-flight"></div>
        </div>

        <div class="card">
            <h2>Traveler Details</h2>
            <form id="travelers-form">
                <div id="travelers-container">
                    <!-- Traveler forms will be generated here -->
                </div>

                <h3 style="margin-top: 30px;">Contact Information</h3>
                <div class="form-group">
                    <label>Contact Email *</label>
                    <input type="email" id="contact_email" required value="john.smith@example.com">
                </div>
                <div class="form-group">
                    <label>Contact Phone *</label>
                    <input type="tel" id="contact_phone" required value="555-123-4567">
                </div>
            </form>
        </div>

        <div class="card">
            <div class="cart-summary" id="booking-summary"></div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-secondary">← Back to Search</a>
            <button class="btn btn-primary" onclick="proceedToPayment()">
                Continue to Payment →
            </button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../common.js"></script>
    <script>
        let searchParams = {};
        let selectedFlight = {};

        function displaySelectedFlight() {
            searchParams = Storage.get('travel_search') || {};
            selectedFlight = Storage.get('travel_selected_flight') || {};

            if (!selectedFlight.id) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('selected-flight').innerHTML = `
                <div class="cart-item">
                    <div class="cart-item-image">${selectedFlight.emoji}</div>
                    <div class="cart-item-details" style="flex-grow: 1;">
                        <h3>${selectedFlight.airline} - ${selectedFlight.id}</h3>
                        <p><strong>${selectedFlight.origin} → ${selectedFlight.destination}</strong></p>
                        <p>${selectedFlight.departure_time} - ${selectedFlight.arrival_time} (${selectedFlight.duration})</p>
                        <p>${selectedFlight.stops}</p>
                    </div>
                    <div style="text-align: right;">
                        <div class="price">${formatCurrency(selectedFlight.total_price)}</div>
                        <p style="font-size: 0.9rem; color: #666;">for ${searchParams.passengers} passenger(s)</p>
                    </div>
                </div>
            `;
        }

        function generateTravelerForms() {
            const container = document.getElementById('travelers-container');
            const numPassengers = searchParams.passengers || 1;

            container.innerHTML = Array.from({ length: numPassengers }, (_, i) => `
                <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <h4 style="margin-bottom: 15px;">Passenger ${i + 1}</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" id="traveler_${i}_first" required value="${i === 0 ? 'John' : 'Jane'}">
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" id="traveler_${i}_last" required value="${i === 0 ? 'Smith' : 'Doe'}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth *</label>
                            <input type="date" id="traveler_${i}_dob" required value="1985-01-15">
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="traveler_${i}_gender" required>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                                <option value="X">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateBookingSummary() {
            const subtotal = selectedFlight.total_price || 0;
            const taxes = subtotal * 0.15;
            const fees = 25.00 * searchParams.passengers;
            const total = subtotal + taxes + fees;

            document.getElementById('booking-summary').innerHTML = `
                <h3 style="margin-bottom: 15px;">Booking Summary</h3>
                <div class="summary-row">
                    <span>Flight Total:</span>
                    <span>${formatCurrency(subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>Taxes & Fees:</span>
                    <span>${formatCurrency(taxes + fees)}</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>${formatCurrency(total)}</span>
                </div>
            `;
        }

        function proceedToPayment() {
            const form = document.getElementById('travelers-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Gather traveler info
            const travelers = [];
            for (let i = 0; i < searchParams.passengers; i++) {
                travelers.push({
                    first_name: document.getElementById(`traveler_${i}_first`).value,
                    last_name: document.getElementById(`traveler_${i}_last`).value,
                    dob: document.getElementById(`traveler_${i}_dob`).value,
                    gender: document.getElementById(`traveler_${i}_gender`).value
                });
            }

            const travelersInfo = {
                travelers: travelers,
                contact_email: document.getElementById('contact_email').value,
                contact_phone: document.getElementById('contact_phone').value
            };

            Storage.set('travel_travelers', travelersInfo);

            // Track travelers added
            trackEvent('add_travelers', {
                event_category: 'travel',
                event_action: 'add_travelers',
                flight_id: selectedFlight.id,
                passengers: searchParams.passengers,
                contact_email: travelersInfo.contact_email
            });

            window.location.href = 'payment.html';
        }

        // Track page view
        trackPageView({
            page_name: 'Traveler Information',
            page_type: 'checkout',
            site_section: 'travel',
            vertical: 'travel',
            checkout_step: 3
        });

        // Initialize
        displaySelectedFlight();
        generateTravelerForms();
        updateBookingSummary();
    </script>
</body>
</html>
